<!doctype html><html><body>
<main class="admin-main">
<div>
    <div id="ordersPanel" class="k-card-body admin-panel">
      <div style="display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap"><select id="orderStatus" class="k-input" style="width:200px"><option value="">全部状态</option><option>payment_review</option><option>paid_attention</option><option>pending_payment</option><option>completed</option><option>expired</option><option>rejected</option><option>refunded</option></select><button class="ui-btn ui-btn-secondary ui-btn-sm" onclick="loadOrders()">刷新</button></div>
      <div class="account-table-scroll"><table><thead><tr><th>订单</th><th>商品</th><th>金额</th><th>状态</th><th>联系方式</th><th>时间</th><th>操作</th></tr></thead><tbody id="ordersBody"></tbody></table></div>
    </div>

    <div id="channelsPanel" class="k-card-body admin-panel" hidden>
      <form id="channelForm"><input type="hidden" id="channelId"><div class="settings-grid"><div class="settings-column"><div class="settings-field"><label class="settings-label">支付类型</label><select class="k-input" id="channelType" onchange="updateChannelFields()"><option value="manual">人工收款</option><option value="wechat">微信支付接口</option><option value="alipay">支付宝接口</option><option value="third_party">易支付</option><option value="crypto">USDT-TRC20</option></select></div><div class="settings-toggle-card"><div><strong>启用支付方式</strong><small>在购买页向用户展示</small></div><input class="k-checkbox" id="channelActive" type="checkbox" checked></div></div><div class="settings-column" id="channelCommonFields"><div class="settings-field"><label class="settings-label">排序</label><input class="k-input" id="channelSort" type="number" value="0"></div><div class="settings-field" id="channelInstructionsField"><label class="settings-label">收款说明</label><input class="k-input" id="channelInstructions" placeholder="例如：付款后请提交凭证"></div></div><div class="settings-column" id="channelManualFields"><div class="settings-field"><label class="settings-label">收款码图片</label><input class="k-input" id="channelQRImageUrl" type="hidden"><label class="settings-label" for="channelQRImageFile">上传收款码</label><input class="k-input" id="channelQRImageFile" type="file" accept="image/*"></div><div class="settings-field"><label class="settings-label">钱包或收款地址</label><input class="k-input" id="channelWalletAddress"></div></div></div><div class="settings-grid" id="channelManualRules" style="margin-top:14px"><div class="settings-column"><div class="settings-toggle-card"><div><strong>要求付款单号</strong><small>用户必须填写付款单号</small></div><input class="k-checkbox" id="channelRequireReference" type="checkbox"></div><div class="settings-toggle-card"><div><strong>要求付款人信息</strong><small>用于核对付款人</small></div><input class="k-checkbox" id="channelRequirePayer" type="checkbox"></div></div><div class="settings-column"><div class="settings-toggle-card"><div><strong>要求付款截图</strong><small>支持图片或 PDF 凭证</small></div><input class="k-checkbox" id="channelRequireProof" type="checkbox"></div><div class="settings-toggle-card"><div><strong>要求备注</strong><small>用户必须填写备注</small></div><input class="k-checkbox" id="channelRequireNote" type="checkbox"></div></div></div><div style="display:flex;justify-content:flex-end;margin-top:16px"><button class="ui-btn ui-btn-primary" type="submit">保存支付配置</button></div></form>
    <div style="margin-top:24px" class="account-table-scroll"><table><thead><tr><th>支付类型</th><th>状态</th><th>操作</th></tr></thead><tbody id="channelsList"></tbody></table></div>
    </div>

    <div id="settingsPanel" class="k-card-body admin-panel" hidden>
      <form id="settingsForm"><div class="settings-grid"><div class="settings-column"><div class="settings-toggle-card"><div><strong>启用商城</strong><small>控制购买前台是否可用</small></div><input class="k-checkbox" id="setEnabled" type="checkbox"></div><div class="settings-field"><label class="settings-label">自动支付过期（分钟）</label><input class="k-input" id="setDefaultExpiry" type="number"></div><div class="settings-field"><label class="settings-label">人工支付过期（分钟）</label><input class="k-input" id="setManualExpiry" type="number"></div><div class="settings-field"><label class="settings-label">存储类型</label><select class="k-input" id="setStorageType"><option value="local">本地私有目录</option><option value="s3">S3 兼容存储</option></select></div><div class="settings-field"><label class="settings-label">本地目录</label><input class="k-input" id="setLocalPath"></div><div class="settings-field"><label class="settings-label">单文件上限 MB</label><input class="k-input" id="setMaxProof" type="number"></div></div><div class="settings-column"><div class="settings-field"><label class="settings-label">S3 Endpoint</label><input class="k-input" id="setS3Endpoint"></div><div class="settings-field"><label class="settings-label">S3 Region</label><input class="k-input" id="setS3Region"></div><div class="settings-field"><label class="settings-label">S3 Bucket</label><input class="k-input" id="setS3Bucket"></div><div class="settings-field"><label class="settings-label">S3 Access Key</label><input class="k-input" id="setS3Access"></div><div class="settings-field"><label class="settings-label">S3 Secret Key</label><input class="k-input" id="setS3Secret" type="password" placeholder="留空不覆盖"></div><div class="settings-toggle-card"><div><strong>使用 HTTPS</strong><small>S3 连接使用 TLS</small></div><input class="k-checkbox" id="setS3SSL" type="checkbox"></div></div><div class="settings-column"><div class="settings-field"><label class="settings-label">SMTP Host</label><input class="k-input" id="setSMTPHost"></div><div class="settings-field"><label class="settings-label">端口</label><input class="k-input" id="setSMTPPort" type="number"></div><div class="settings-field"><label class="settings-label">用户名</label><input class="k-input" id="setSMTPUser"></div><div class="settings-field"><label class="settings-label">密码</label><input class="k-input" id="setSMTPPass" type="password" placeholder="留空不覆盖"></div><div class="settings-field"><label class="settings-label">发件人</label><input class="k-input" id="setSMTPFrom"></div><div class="settings-toggle-card"><div><strong>TLS</strong><small>使用加密 SMTP 连接</small></div><input class="k-checkbox" id="setSMTPTLS" type="checkbox"></div><div class="settings-toggle-card"><div><strong>完成后发邮件</strong><small>通知购买者订单已完成</small></div><input class="k-checkbox" id="setEmailComplete" type="checkbox"></div><div class="settings-toggle-card"><div><strong>邮件包含完整卡密</strong><small>关闭时仅发送查询提醒</small></div><input class="k-checkbox" id="setEmailCard" type="checkbox"></div></div></div><button class="ui-btn ui-btn-primary" type="submit">保存商城设置</button></form>
    </div>
  </div>
</main></body></html>
